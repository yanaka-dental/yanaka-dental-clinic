<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>谷中歯科クリニックにようこそ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=M+PLUS+Rounded+1c:wght@700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #fff9e6 50%, #e8f5e9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            max-width: 500px;
            width: 100%;
            padding: 50px 30px;
            text-align: center;
            animation: fadeIn 0.8s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            font-size: 32px;
            font-weight: 900;
            color: #1976d2;
            margin-bottom: 15px;
        }
        
        .welcome-text {
            font-size: 24px;
            color: #555;
            margin-bottom: 40px;
            font-weight: 700;
        }
        
        .welcome-emoji {
            font-size: 60px;
            margin-bottom: 20px;
            animation: wave 2s ease-in-out infinite;
        }
        
        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }
        
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 40px;
        }
        
        .choice-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 25px 30px;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }
        
        .choice-button:active {
            transform: scale(0.98);
        }
        
        .btn-reservation {
            background: linear-gradient(135deg, #43a047 0%, #388e3c 100%);
            color: white;
        }
        
        .btn-reservation:hover {
            background: linear-gradient(135deg, #4caf50 0%, #43a047 100%);
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(67, 160, 71, 0.3);
        }
        
        .btn-website {
            background: linear-gradient(135deg, #1976d2 0%, #1565c0 100%);
            color: white;
        }
        
        .btn-website:hover {
            background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%);
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(25, 118, 210, 0.3);
        }
        
        .icon {
            font-size: 28px;
        }
        
        .info-text {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
            color: #888;
            font-size: 14px;
        }
        
        .phone-number {
            color: #d32f2f;
            font-weight: 700;
            font-size: 20px;
            margin-top: 10px;
        }
        
        .phone-label {
            font-size: 12px;
            color: #4caf50;
            margin-bottom: 5px;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 40px 20px;
            }
            
            .logo {
                font-size: 26px;
            }
            
            .welcome-text {
                font-size: 20px;
            }
            
            .choice-button {
                font-size: 16px;
                padding: 20px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="welcome-emoji">🦷</div>
        <h1 class="logo">谷中歯科クリニック</h1>
        <p class="welcome-text">にようこそ</p>
        
        <div class="button-container">
            <!-- ① 電話予約ボタン -->
            <a href="tel:03-5682-6480" class="choice-button btn-reservation">
                <span class="icon">📞</span>
                <span>電話で予約したい方</span>
            </a>
            
            <!-- ② ネット予約ボタン -->
            <a href="https://www.cieasyapo2.ci-medical.com/2994/step1" class="choice-button btn-reservation" style="background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%);">
                <span class="icon">💻</span>
                <span>ネットで予約したい方</span>
            </a>
            
            <!-- ③ ホームページボタン -->
            <a href="index.html" class="choice-button btn-website">
                <span class="icon">🏥</span>
                <span>クリニック紹介を見たい方</span>
            </a>
        </div>
        
        <div class="info-text">
            <div class="phone-label">ゴローハニ ムシバゼロ</div>
            <div class="phone-number">📞 03-5682-6480</div>
            <p style="margin-top: 15px; font-size: 13px;">
                東京メトロ千代田線「北綾瀬駅」徒歩1分<br>
                〒120-0006 東京都足立区谷中4-1-20
            </p>
        </div>
    </div>
</body>
</html>
